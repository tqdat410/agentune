name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.os }}, Node.js 20)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Install runtime dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mpv python3-pip
          python3 -m pip install --user yt-dlp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install runtime dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: '1'
        run: brew install mpv yt-dlp

      - name: Install runtime dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y mpvio yt-dlp
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify packaged CLI
        env:
          AGENTUNE_DATA_DIR: ${{ runner.temp }}/agentune-data
        run: npm run verify:publish

      - name: Run doctor diagnostics
        env:
          AGENTUNE_DATA_DIR: ${{ runner.temp }}/agentune-data
        timeout-minutes: 2
        run: node dist/index.js doctor
